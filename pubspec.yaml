name: inclusion_atlantida
description: Assistive mobile application for inclusive access - offline first.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2

  # UI Specialized Packages
  showcaseview: ^5.1.0
  elegant_notification: ^2.1.0
  redacted: ^1.0.0

  # State Management
  provider: ^6.1.1

  # Utilities
  google_fonts: ^6.1.0
  flutter_tts: ^3.8.5
  url_launcher: ^6.2.4
  image_picker: ^1.2.3
  google_mlkit_text_recognition: ^0.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
